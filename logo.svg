<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pocket Digest — Instant patient summaries for clinicians</title>
<meta name="description" content="Pocket Digest helps clinicians generate clear, plain-English patient summaries in seconds. Powered by AI.">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1a6b4a;
    --green-dark: #124d35;
    --green-light: #f0f7f3;
    --green-mid: #cde0d6;
    --text: #1a1a1a;
    --muted: #5a7a6a;
  }

  body { font-family: 'DM Sans', sans-serif; color: var(--text); background: #fff; line-height: 1.6; }
  a { color: inherit; text-decoration: none; }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--green-mid);
    position: sticky;
    top: 0;
    background: #fff;
    z-index: 10;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 17px;
    font-weight: 500;
    color: var(--green);
  }

  .nav-logo img { width: 32px; height: 32px; border-radius: 8px; }

  .nav-cta {
    background: var(--green);
    color: #fff;
    padding: 9px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.15s;
  }

  .nav-cta:hover { background: var(--green-dark); }

  .hero {
    max-width: 800px;
    margin: 0 auto;
    padding: 5rem 2rem 4rem;
    text-align: center;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--green-light);
    color: var(--green);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 999px;
    margin-bottom: 1.5rem;
    border: 1px solid var(--green-mid);
  }

  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(36px, 6vw, 56px);
    font-weight: 400;
    line-height: 1.15;
    margin-bottom: 1.25rem;
  }

  .hero h1 em { font-style: italic; color: var(--green); }

  .hero p {
    font-size: 18px;
    color: var(--muted);
    max-width: 520px;
    margin: 0 auto 2.5rem;
    line-height: 1.7;
  }

  .hero-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  .btn-primary {
    background: var(--green);
    color: #fff;
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    transition: background 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn-primary:hover { background: var(--green-dark); }

  .btn-secondary {
    background: var(--green-light);
    color: var(--green);
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    border: 1.5px solid var(--green-mid);
    transition: all 0.15s;
  }

  .btn-secondary:hover { border-color: var(--green); }

  .preview {
    max-width: 680px;
    margin: 3rem auto 0;
    background: var(--green-light);
    border: 1.5px solid var(--green-mid);
    border-radius: 16px;
    overflow: hidden;
  }

  .preview-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 12px 16px;
    background: var(--green-mid);
  }

  .preview-dot { width: 10px; height: 10px; border-radius: 50%; }

  .preview-body {
    padding: 1.75rem 2rem;
    background: #fff;
    margin: 0 1rem 1rem;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    text-align: left;
  }

  .preview-body h2 { font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; color: var(--green); margin-bottom: 0.5rem; }
  .preview-body h3 { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin: 1rem 0 0.4rem; }
  .preview-body p { margin-bottom: 0.5rem; color: #333; }
  .preview-body ul { padding-left: 1.2rem; }
  .preview-body li { margin-bottom: 0.3rem; color: #333; }

  .section { padding: 5rem 2rem; max-width: 900px; margin: 0 auto; }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 0.75rem;
  }

  .section h2 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(28px, 4vw, 38px);
    font-weight: 400;
    margin-bottom: 3rem;
    line-height: 1.2;
  }

  .steps { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem; }

  .step { display: flex; flex-direction: column; gap: 12px; }

  .step-num {
    width: 40px; height: 40px;
    background: var(--green);
    color: #fff;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 500;
  }

  .step h3 { font-size: 16px; font-weight: 500; }
  .step p { font-size: 14px; color: var(--muted); line-height: 1.6; }

  .why { background: var(--green-light); border-top: 1px solid var(--green-mid); border-bottom: 1px solid var(--green-mid); padding: 5rem 2rem; }
  .why-inner { max-width: 900px; margin: 0 auto; }

  .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-top: 3rem; }

  .feature { background: #fff; border: 1.5px solid var(--green-mid); border-radius: 14px; padding: 1.5rem; }
  .feature-icon { font-size: 24px; margin-bottom: 0.75rem; }
  .feature h3 { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
  .feature p { font-size: 13px; color: var(--muted); line-height: 1.6; }

  .cta { text-align: center; padding: 6rem 2rem; max-width: 600px; margin: 0 auto; }

  .cta h2 { font-family: 'DM Serif Display', serif; font-size: clamp(28px, 4vw, 40px); font-weight: 400; margin-bottom: 1rem; line-height: 1.2; }
  .cta p { font-size: 16px; color: var(--muted); margin-bottom: 2rem; }

  footer { border-top: 1px solid var(--green-mid); padding: 1.5rem 2rem; text-align: center; font-size: 13px; color: var(--muted); }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <img src="logo.svg" alt="Pocket Digest logo">
    Pocket Digest
  </div>
  <a href="app.html" class="nav-cta">Try it free →</a>
</nav>

<section class="hero">
  <div class="hero-badge">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    Built for healthcare workers
  </div>
  <h1>Patient summaries,<br><em>instantly digested</em></h1>
  <p>Type a diagnosis, procedure, or medication. Get a clear, plain-English take-home summary your patient will actually understand — in seconds.</p>
  <div class="hero-btns">
    <a href="app.html" class="btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      Generate a summary free
    </a>
    <a href="#how" class="btn-secondary">See how it works</a>
  </div>

  <div class="preview">
    <div class="preview-bar">
      <div class="preview-dot" style="background:#ff5f57"></div>
      <div class="preview-dot" style="background:#febc2e"></div>
      <div class="preview-dot" style="background:#28c840"></div>
    </div>
    <div class="preview-body">
      <h2>Understanding Type 2 Diabetes</h2>
      <h3>What is it?</h3>
      <p>Type 2 diabetes is a condition where your body has trouble using a hormone called insulin to control blood sugar levels. The good news is it can be managed well with the right steps.</p>
      <h3>What you can do</h3>
      <ul>
        <li>Try to walk for 30 minutes most days</li>
        <li>Eat regular meals and limit sugary drinks</li>
        <li>Take your medication as prescribed</li>
        <li>Check your blood sugar as directed</li>
      </ul>
      <h3>Questions?</h3>
      <p>Please ask your care team — no question is too small.</p>
    </div>
  </div>
</section>

<section class="section" id="how">
  <div class="section-label">How it works</div>
  <h2>From diagnosis to summary<br>in under 10 seconds</h2>
  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <h3>Type your topic</h3>
      <p>Enter any diagnosis, procedure, or medication — Pocket Digest handles the rest.</p>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <h3>Choose your settings</h3>
      <p>Pick the reading level and focus — overview, aftercare, medication, or warning signs.</p>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <h3>Add your notes</h3>
      <p>Include specific instructions for this patient — follow-up dates, restrictions, reminders.</p>
    </div>
    <div class="step">
      <div class="step-num">4</div>
      <h3>Copy or print</h3>
      <p>Your summary is ready instantly. Copy it, print it, or paste it anywhere.</p>
    </div>
  </div>
</section>

<section class="why">
  <div class="why-inner">
    <div class="section-label">Why Pocket Digest</div>
    <h2>Clinicians are time-poor.<br>Patients deserve clarity.</h2>
    <div class="features">
      <div class="feature">
        <div class="feature-icon">⚡</div>
        <h3>Seconds, not minutes</h3>
        <p>What used to take 10 minutes of typing now takes 10 seconds. More time for patients, less time at a keyboard.</p>
      </div>
      <div class="feature">
        <div class="feature-icon">📖</div>
        <h3>Plain English</h3>
        <p>Choose the right reading level — simple, standard, or tailored for elderly and ESL patients.</p>
      </div>
      <div class="feature">
        <div class="feature-icon">🎯</div>
        <h3>Focused content</h3>
        <p>Generate exactly what the patient needs — overview, aftercare, medication guidance, or warning signs.</p>
      </div>
      <div class="feature">
        <div class="feature-icon">🖨️</div>
        <h3>Print-ready</h3>
        <p>One click to print a clean, professional summary. No reformatting, no copy-pasting into Word.</p>
      </div>
      <div class="feature">
        <div class="feature-icon">✏️</div>
        <h3>Your notes included</h3>
        <p>Add specific instructions for each patient — follow-up dates, medications to avoid, activity restrictions.</p>
      </div>
      <div class="feature">
        <div class="feature-icon">🔒</div>
        <h3>No patient data stored</h3>
        <p>Pocket Digest never stores patient information. Just type the condition — never the patient's name or details.</p>
      </div>
    </div>
  </div>
</section>

<section class="cta">
  <h2>Ready to save time<br>every single shift?</h2>
  <p>Try Pocket Digest free — no account needed, no credit card.</p>
  <a href="app.html" class="btn-primary" style="font-size:16px; padding: 15px 32px;">
    Generate your first summary →
  </a>
</section>

<footer>
  © 2026 Pocket Digest · Powered by Claude AI · Built for healthcare workers
</footer>

</body>
</html>
