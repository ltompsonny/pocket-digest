<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pocket Digest — Back On Track Physiotherapy</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f0f4f2; min-height: 100vh; color: #1a1a1a; }
  .header { background: #fff; border-bottom: 3px solid #b8341a; }
  .header img { display: block; width: 100%; max-width: 100%; height: auto; }
  .main { max-width: 780px; margin: 0 auto; padding: 1.75rem 1.5rem 4rem; }
  .page-title { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; color: #1a1a1a; margin-bottom: 1.5rem; }
  .page-title span { color: #1a4a8a; }
  .card { background: #fff; border-radius: 14px; padding: 1.5rem; margin-bottom: 1.25rem; border: 1.5px solid #dce8f0; }
  .card-title { font-size: 11px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: #5a7a9a; margin-bottom: 1rem; }
  .field { margin-bottom: 1.1rem; }
  .field:last-child { margin-bottom: 0; }
  label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: #5a7a9a; margin-bottom: 6px; }
  input[type="text"], textarea { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 10px 13px; border: 1.5px solid #c8dcea; border-radius: 8px; background: #f7fafc; color: #1a1a1a; outline: none; transition: border-color 0.15s; }
  input[type="text"]:focus, textarea:focus { border-color: #1a4a8a; background: #fff; }
  textarea { resize: vertical; min-height: 72px; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill { font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 5px 14px; border-radius: 999px; border: 1.5px solid #c8dcea; background: #f0f6fa; color: #3a6a8a; cursor: pointer; transition: all 0.12s; }
  .pill:hover { border-color: #1a4a8a; color: #1a4a8a; }
  .pill.active { background: #1a4a8a; border-color: #1a4a8a; color: #fff; font-weight: 500; }
  .diagram-toggle { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px; color: #1a1a1a; user-select: none; text-transform: none; letter-spacing: 0; font-weight: 400; }
  .diagram-toggle input[type="checkbox"] { width: 18px; height: 18px; accent-color: #1a4a8a; cursor: pointer; flex-shrink: 0; }
  .gen-btn { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; padding: 13px; background: #1a4a8a; color: #fff; border: none; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s; margin-top: 0.5rem; }
  .gen-btn:hover { background: #123570; }
  .gen-btn:disabled { background: #7a9aba; cursor: not-allowed; }
  .spinner { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.35); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .diagram-picker { display: none; margin-top: 1.25rem; }
  .diagram-picker.visible { display: block; }
  .diagram-picker-title { font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: #5a7a9a; margin-bottom: 0.75rem; }
  .diagram-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .diagram-option { border: 2px solid #c8dcea; border-radius: 10px; overflow: hidden; cursor: pointer; transition: border-color 0.12s; background: #fff; position: relative; }
  .diagram-option:hover { border-color: #1a4a8a; }
  .diagram-option.selected { border-color: #1a4a8a; }
  .diagram-option .check { position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; background: #1a4a8a; border-radius: 50%; display: none; align-items: center; justify-content: center; color: #fff; font-size: 13px; }
  .diagram-option.selected .check { display: flex; }
  .diagram-option img { width: 100%; height: 130px; object-fit: contain; background: #f7fafc; display: block; padding: 8px; }
  .diagram-option-body { padding: 8px 10px; }
  .diagram-option-title { font-size: 12px; font-weight: 500; color: #1a1a1a; margin-bottom: 3px; }
  .diagram-option-desc { font-size: 11px; color: #5a7a9a; line-height: 1.4; }
  .diagram-loading { display: flex; align-items: center; gap: 10px; color: #5a7a9a; font-size: 13px; font-style: italic; padding: 1rem 0; }
  .diagram-spinner { width: 16px; height: 16px; border: 2px solid #c8dcea; border-top-color: #1a4a8a; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  .output-card { background: #fff; border-radius: 14px; border: 1.5px solid #dce8f0; overflow: hidden; margin-top: 1.25rem; display: none; }
  .output-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: #f0f6fa; border-bottom: 1.5px solid #dce8f0; }
  .output-toolbar-label { font-size: 11px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: #5a7a9a; }
  .toolbar-btns { display: flex; gap: 7px; }
  .toolbar-btn { font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 5px 12px; border-radius: 6px; border: 1.5px solid #c8dcea; background: #fff; color: #3a6a8a; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.12s; }
  .toolbar-btn:hover { border-color: #1a4a8a; color: #1a4a8a; }
  .output-body { padding: 1.5rem 1.75rem; font-size: 15px; line-height: 1.85; color: #1a1a1a; min-height: 100px; }
  .output-body h2 { font-family: 'DM Serif Display', serif; font-size: 21px; font-weight: 400; color: #1a4a8a; margin-bottom: 0.6rem; }
  .output-body h3 { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: #7a9aba; margin-top: 1.3rem; margin-bottom: 0.4rem; }
  .output-body p { margin-bottom: 0.6rem; }
  .output-body ul { padding-left: 1.25rem; margin-bottom: 0.6rem; }
  .output-body li { margin-bottom: 0.3rem; }
  .output-diagrams { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin: 1.25rem 1.75rem; padding-top: 1.25rem; border-top: 1px solid #dce8f0; }
  .output-diagram img { width: 100%; border-radius: 8px; border: 1px solid #dce8f0; }
  .output-diagram p { font-size: 11px; color: #5a7a9a; margin-top: 5px; text-align: center; }
  .loading-state { display: flex; align-items: center; gap: 12px; color: #7a9aba; font-size: 14px; font-style: italic; padding: 1.75rem; }
  .loading-spinner { width: 18px; height: 18px; border: 2px solid #dce8f0; border-top-color: #1a4a8a; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  .error-msg { color: #c0392b; font-size: 14px; padding: 1.25rem 1.75rem; }
  .disclaimer { margin: 0 1.75rem 1.25rem; padding: 9px 13px; background: #fffbea; border-left: 3px solid #f0c040; border-radius: 0 6px 6px 0; font-size: 12px; color: #7a6020; display: none; }
  @media print {
    body { background: #fff; }
    .main { padding: 0 1rem; }
    .card, .gen-btn, .output-toolbar, .disclaimer, .diagram-picker { display: none !important; }
    .output-card { display: block !important; border: none; margin: 0; }
    .output-body { padding: 1rem 0; }
    .header { border-bottom: none; }
  }
  @media (max-width: 520px) {
    .two-col { grid-template-columns: 1fr; }
    .diagram-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <img src="BackontrackLetterhead.jpg" alt="Back On Track Physiotherapy" />
</div>

<div class="main">
  <p class="page-title">Patient <span>Handout</span> Generator</p>

  <div class="card">
    <div class="card-title">Generate a handout</div>
    <div class="field">
      <label for="topic">Diagnosis, procedure or medication</label>
      <input type="text" id="topic" placeholder="e.g. Anterior horn lateral meniscus tear, ACL repair, Metformin…" />
    </div>
    <div class="two-col" style="margin-bottom:1.1rem">
      <div class="field" style="margin:0">
        <label>Reading level</label>
        <div class="pills" id="level-group">
          <button class="pill active" data-val="simple">Simple</button>
          <button class="pill" data-val="standard">Standard</button>
          <button class="pill" data-val="elderly">Elderly / ESL</button>
        </div>
      </div>
      <div class="field" style="margin:0">
        <label>Focus</label>
        <div class="pills" id="focus-group">
          <button class="pill active" data-val="overview">Overview</button>
          <button class="pill" data-val="aftercare">Aftercare</button>
          <button class="pill" data-val="medication">Medication</button>
          <button class="pill" data-val="warning">Warning signs</button>
        </div>
      </div>
    </div>
    <div class="field">
      <label for="notes">Clinician notes to include (optional)</label>
      <textarea id="notes" placeholder="e.g. Follow up in 2 weeks, avoid ibuprofen, no driving for 24hrs…"></textarea>
    </div>
    <div class="field">
      <label class="diagram-toggle">
        <input type="checkbox" id="diagram-check">
        Include diagrams from medical image library
      </label>
    </div>
    <button class="gen-btn" id="gen-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      Generate handout
    </button>
  </div>

  <div class="diagram-picker card" id="diagram-picker">
    <div class="diagram-picker-title">Select diagrams to include — choose 1, 2, or all 3</div>
    <div id="diagram-loading" class="diagram-loading" style="display:none">
      <div class="diagram-spinner"></div> Searching medical image library…
    </div>
    <div class="diagram-grid" id="diagram-grid"></div>
  </div>

  <div class="output-card" id="output-card">
    <div class="output-toolbar">
      <span class="output-toolbar-label">Generated handout</span>
      <div class="toolbar-btns">
        <button class="toolbar-btn" id="copy-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
        <button class="toolbar-btn" id="print-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print
        </button>
      </div>
    </div>
    <div class="output-body" id="output-body"></div>
    <div class="disclaimer" id="disclaimer">
      <strong>Clinical reminder:</strong> Review AI-generated content before giving it to a patient. Use your clinical judgment.
    </div>
  </div>
</div>

<script>
var selectedLevel = 'simple';
var selectedFocus = 'overview';
var selectedDiagrams = [];

document.getElementById('level-group').addEventListener('click', function(e) {
  var btn = e.target.closest('.pill'); if (!btn) return;
  document.querySelectorAll('#level-group .pill').forEach(function(p) { p.classList.remove('active'); });
  btn.classList.add('active'); selectedLevel = btn.dataset.val;
});

document.getElementById('focus-group').addEventListener('click', function(e) {
  var btn = e.target.closest('.pill'); if (!btn) return;
  document.querySelectorAll('#focus-group .pill').forEach(function(p) { p.classList.remove('active'); });
  btn.classList.add('active'); selectedFocus = btn.dataset.val;
});

document.getElementById('gen-btn').addEventListener('click', function() {
  var topic = document.getElementById('topic').value.trim();
  if (!topic) { document.getElementById('topic').focus(); return; }
  var notes = document.getElementById('notes').value.trim();
  var includeDiagrams = document.getElementById('diagram-check').checked;
  var btn = document.getElementById('gen-btn');
  var outputCard = document.getElementById('output-card');
  var outputBody = document.getElementById('output-body');
  var disclaimer = document.getElementById('disclaimer');

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Generating…';
  outputCard.style.display = 'block';
  disclaimer.style.display = 'none';
  outputBody.innerHTML = '<div class="loading-state"><div class="loading-spinner"></div>Writing your handout…</div>';
  selectedDiagrams = [];

  fetch('/api/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ topic: topic, level: selectedLevel, focus: selectedFocus, notes: notes })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error) {
      outputBody.innerHTML = '<div class="error-msg">Error: ' + data.error + '</div>';
    } else {
      outputBody.innerHTML = data.html;
      disclaimer.style.display = 'block';
      if (includeDiagrams) { loadDiagrams(topic); }
    }
  })
  .catch(function() {
    outputBody.innerHTML = '<div class="error-msg">Something went wrong. Please try again.</div>';
  })
  .finally(function() {
    btn.disabled = false;
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Generate handout';
  });
});

function loadDiagrams(topic) {
  var picker = document.getElementById('diagram-picker');
  var grid = document.getElementById('diagram-grid');
  var loading = document.getElementById('diagram-loading');
  picker.classList.add('visible');
  grid.innerHTML = '';
  loading.style.display = 'flex';
  selectedDiagrams = [];

  var query = encodeURIComponent(topic + ' anatomy medical diagram');
  var url = 'https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=' + query + '&srnamespace=6&srlimit=5&format=json&origin=*';

  fetch(url)
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var results = (data.query && data.query.search) || [];
    var promises = results.slice(0, 5).map(function(r) {
      return fetch('https://en.wikipedia.org/w/api.php?action=query&titles=' + encodeURIComponent(r.title) + '&prop=imageinfo&iiprop=url|mime&format=json&origin=*')
      .then(function(r2) { return r2.json(); })
      .then(function(d) {
        var pages = d.query && d.query.pages;
        var page = pages && Object.values(pages)[0];
        var info = page && page.imageinfo && page.imageinfo[0];
        if (info && ['image/png','image/jpeg','image/svg+xml'].includes(info.mime)) {
          return { url: info.url, title: r.title.replace('File:','').replace(/\.[^.]+$/,''), desc: 'Medical illustration from Wikimedia Commons' };
        }
        return null;
      }).catch(function() { return null; });
    });

    Promise.all(promises).then(function(images) {
      loading.style.display = 'none';
      images = images.filter(Boolean).slice(0, 3);
      if (images.length === 0) {
        grid.innerHTML = '<p style="font-size:13px;color:#5a7a9a;grid-column:1/-1">No diagrams found for this topic.</p>';
        return;
      }
      images.forEach(function(img) {
        var div = document.createElement('div');
        div.className = 'diagram-option';
        div.innerHTML = '<div class="check">✓</div><img src="' + img.url + '" alt="' + img.title + '" onerror="this.style.display=\'none\'"><div class="diagram-option-body"><div class="diagram-option-title">' + img.title + '</div><div class="diagram-option-desc">' + img.desc + '</div></div>';
        div.addEventListener('click', function() {
          div.classList.toggle('selected');
          if (div.classList.contains('selected')) { selectedDiagrams.push(img); }
          else { selectedDiagrams = selectedDiagrams.filter(function(d) { return d.url !== img.url; }); }
          updateDiagramsInOutput();
        });
        grid.appendChild(div);
      });
    });
  })
  .catch(function() {
    loading.style.display = 'none';
    grid.innerHTML = '<p style="font-size:13px;color:#c0392b;grid-column:1/-1">Could not load diagrams. Check your connection.</p>';
  });
}

function updateDiagramsInOutput() {
  var existing = document.getElementById('output-diagrams');
  if (existing) existing.remove();
  if (selectedDiagrams.length === 0) return;
  var body = document.getElementById('output-body');
  var diagDiv = document.createElement('div');
  diagDiv.id = 'output-diagrams';
  diagDiv.className = 'output-diagrams';
  selectedDiagrams.forEach(function(img) {
    var d = document.createElement('div');
    d.className = 'output-diagram';
    d.innerHTML = '<img src="' + img.url + '" alt="' + img.title + '"><p>' + img.title + '</p>';
    diagDiv.appendChild(d);
  });
  body.appendChild(diagDiv);
}

document.getElementById('copy-btn').addEventListener('click', function() {
  var text = document.getElementById('output-body').innerText;
  var btn = document.getElementById('copy-btn');
  navigator.clipboard.writeText(text).then(function() {
    btn.innerHTML = '✓ Copied!';
    setTimeout(function() { btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy'; }, 2000);
  });
});

document.getElementById('print-btn').addEventListener('click', function() { window.print(); });
</script>
</body>
</html>
